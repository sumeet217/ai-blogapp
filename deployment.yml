apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-blogapp-deployment
  namespace: ai-blogapp
  labels:
    app: ai-blogapp

spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-blogapp

  template:
    metadata:
      labels:
        app: ai-blogapp

    spec:
      containers:
        - name: ai-blogapp
          image: sumeet02/ai-powered-blogapp:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config