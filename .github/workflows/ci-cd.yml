# ──────────────────────────────────────────────────────────────
# GitHub Actions CI/CD Pipeline
# Project: AI Powered Blog (Django + React)
#
# Flow:
#   1. Build Docker image (React + Django)
#   2. Push to DockerHub
#   3. SSH into EC2 → docker compose pull → docker compose up -d
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME   → sumeet02
#   DOCKERHUB_TOKEN      → DockerHub access token
#   EC2_HOST             → your EC2 public IP
#   EC2_USER             → ubuntu
#   EC2_SSH_KEY          → contents of your .pem private key
#   GROQ_API_KEY         → your Groq API key
#   DJANGO_SECRET_KEY    → your Django secret key
#   POSTGRES_PASSWORD    → your DB password
# ──────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: sumeet02/ai-powered-blogapp

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # ────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Django tests
        run: |
          docker run --rm \
            -e USE_POSTGRES=False \
            -e SECRET_KEY=test-secret-key-for-ci \
            -e GROQ_API_KEY=test \
            -e DEBUG=True \
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }} \
            python manage.py test --verbosity=2

  # ────────────────────────────────────────────────────────────
  # Job 2: Push to DockerHub (main branch only)
  # ────────────────────────────────────────────────────────────
  push:
    name: 🐳 Push to DockerHub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: echo "✅ Pushed ${{ env.IMAGE_NAME }}:latest"

  # ────────────────────────────────────────────────────────────
  # Job 3: Deploy to EC2
  # ────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_NAME
          script: |
            cd /home/ubuntu/ai-blog/ai-blogapp

            # Write fresh .env on every deploy
            cat > .env << ENVEOF
            SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=*
            USE_POSTGRES=True
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}}
            POSTGRES_HOST=db
            POSTGRES_PORT=5432
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            ENVEOF

            # Login to DockerHub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull latest image and restart
            docker compose pull
            docker compose up -d --force-recreate

            # Clean up old images
            docker image prune -f

            echo "✅ Deployed successfully!"
            echo "🌐 Live at http://${{ secrets.EC2_HOST }}"